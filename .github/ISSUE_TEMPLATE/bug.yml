name: Bug report
description: Report reproducible behavior that does not match the documented contract.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. For setup friction, use the quickstart feedback form.
        Report security vulnerabilities privately through the repository security policy.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened, including the smallest safe error output that explains it?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did the documentation or public contract lead you to expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest commands or public-fixture code needed to reproduce the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: x424 commit/version, operating system, Node.js, runtime/framework
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive-data check
      options:
        - label: I used synthetic or public fixture data and removed all secrets and stable identifiers.
          required: true
