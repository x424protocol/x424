name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Match tag to package version
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Smoke-test the packed package
        run: |
          pnpm pack --pack-destination "$RUNNER_TEMP"
          package_path="$RUNNER_TEMP/x424-$(node -p "require('./package.json').version").tgz"
          test -f "$package_path"
          smoke_dir="$RUNNER_TEMP/x424-smoke"
          mkdir "$smoke_dir"
          cd "$smoke_dir"
          npm init --yes
          npm install "$package_path"
          node --input-type=module -e "await import('x424'); await import('x424/core'); await import('x424/client'); await import('x424/adapters'); await import('x424/providers/world-id'); await import('x424/providers/world-id/client'); await import('x424/redis'); await import('x424/express'); await import('x424/mcp')"

      - name: Publish with provenance
        run: npm publish --access public --provenance
