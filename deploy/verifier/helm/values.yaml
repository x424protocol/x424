replicaCount: 2

image:
  repository: ghcr.io/x424protocol/x424-verifier
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  port: 8080

config:
  deploymentProfile: prod-ha-0.2
  providerRequestMode: issuer
  worldEnvironment: production
  worldAllowLegacyProofs: "false"

secretName: x424-verifier

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

networkPolicy:
  enabled: true
  worldCidrs: []
  redisCidrs: []
